<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>NPTEL NLP Practice</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary-container": "#6760fd",
                    "secondary-container": "#e3dfff",
                    "surface-container-high": "#e1e9f0",
                    "on-tertiary-fixed": "#004b33",
                    "tertiary-fixed": "#6bffc1",
                    "on-background": "#2a343a",
                    "tertiary": "#006d4b",
                    "outline-variant": "#a9b3bb",
                    "primary-dim": "#4135d8",
                    "tertiary-container": "#6bffc1",
                    "on-tertiary-container": "#006042",
                    "on-secondary-fixed": "#3a3875",
                    "outline": "#727c83",
                    "tertiary-fixed-dim": "#5af0b4",
                    "secondary-fixed-dim": "#d3d0ff",
                    "on-surface-variant": "#566167",
                    "tertiary-dim": "#005f41",
                    "on-surface": "#2a343a",
                    "on-primary-container": "#000000",
                    "on-error": "#fff7f7",
                    "primary": "#4e45e4",
                    "error-dim": "#6b0221",
                    "primary-fixed-dim": "#5a52f0",
                    "error-container": "#f97386",
                    "surface": "#f6fafe",
                    "surface-container-lowest": "#ffffff",
                    "inverse-primary": "#8582ff",
                    "inverse-on-surface": "#999da1",
                    "secondary-fixed": "#e3dfff",
                    "on-tertiary-fixed-variant": "#006b4a",
                    "background": "#f6fafe",
                    "surface-container": "#e7eff5",
                    "on-secondary-container": "#4d4b89",
                    "on-tertiary": "#e6ffef",
                    "error": "#a8364b",
                    "on-primary-fixed-variant": "#edeaff",
                    "surface-bright": "#f6fafe",
                    "surface-variant": "#d9e4ec",
                    "on-primary-fixed": "#ffffff",
                    "on-primary": "#fbf7ff",
                    "on-error-container": "#6e0523",
                    "surface-tint": "#4e45e4",
                    "on-secondary": "#fbf7ff",
                    "secondary": "#5b5897",
                    "surface-dim": "#d1dce3",
                    "secondary-dim": "#4e4c8a",
                    "surface-container-low": "#eef4fa",
                    "on-secondary-fixed-variant": "#575493",
                    "inverse-surface": "#0a0f12",
                    "primary-fixed": "#6760fd",
                    "surface-container-highest": "#d9e4ec"
                },
                "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
                },
                "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
                }
            },
        },
    }
</script>
<style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-header { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    html { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-surface text-on-surface">

<aside class="h-screen w-64 fixed left-0 top-0 rounded-r-[2rem] bg-slate-50 dark:bg-slate-950 shadow-[40px_0_60px_-15px_rgba(78,69,228,0.06)] flex flex-col p-6 gap-8 z-50">
    <div class="flex flex-col gap-1">
        <span class="text-2xl font-black text-indigo-700 dark:text-indigo-300 italic">NPTEL REVISE</span>
        <span class="font-['Inter'] text-xs font-medium tracking-tight text-on-surface-variant">NLP Practice</span>
    </div>

    <nav class="flex flex-col gap-2">
        <div class="relative group">
            <a id="nav-learning" onclick="toggleDropdown()" class="cursor-pointer flex justify-between items-center p-4 text-slate-500 dark:text-slate-400 hover:text-indigo-500 hover:scale-[1.02] transition-transform duration-300 scale-95 active:scale-100 rounded-xl">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">space_dashboard</span>
                    <span class="font-['Inter'] font-medium tracking-tight">Study Hub <span id="current-set-label" class="text-[10px] ml-1 px-2 py-0.5 bg-primary/20 text-indigo-800 dark:text-indigo-200 rounded-full font-bold">SET-1</span></span>
                </div>
                <span class="material-symbols-outlined transition-transform duration-200" id="study-dropdown-icon">expand_more</span>
            </a>
            <div id="study-dropdown" class="hidden flex-col gap-1 mt-1 mx-2 bg-white dark:bg-slate-900 rounded-xl shadow-md border border-primary/10 overflow-hidden">
                <a onclick="selectSet('SET-1')" class="cursor-pointer px-4 py-3 text-sm font-semibold hover:bg-primary/10 transition-colors text-on-surface flex items-center justify-between group">
                    SET-1 
                    <span class="material-symbols-outlined text-[16px] text-primary hidden group-hover:block">arrow_forward</span>
                </a>
                <a onclick="selectSet('SET-2')" class="cursor-pointer px-4 py-3 text-sm font-semibold hover:bg-primary/10 transition-colors text-on-surface flex items-center justify-between group">
                    SET-2 
                    <span class="material-symbols-outlined text-[16px] text-primary hidden group-hover:block">arrow_forward</span>
                </a>
            </div>
        </div>
        <a id="nav-testing" onclick="switchMode('testing')" class="cursor-pointer flex items-center gap-3 p-4 text-slate-500 dark:text-slate-400 hover:text-indigo-500 hover:scale-[1.02] transition-transform duration-300 scale-95 active:scale-100 rounded-xl">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="font-['Inter'] font-medium tracking-tight">Active Session</span>
        </a>
    </nav>

    <div class="mt-auto">
        <button onclick="switchMode('testing')" class="w-full py-4 px-6 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold shadow-[0_10px_40px_rgba(78,69,228,0.2)] hover:scale-[1.02] transition-transform duration-300">
            Start New Test
        </button>
        <div class="mt-8 flex items-center gap-3 px-2">
            <img alt="User profile" class="w-10 h-10 rounded-full object-cover" src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff">
            <div class="flex flex-col">
                <span class="text-sm font-bold">NPTEL Learner</span>
                <span class="text-xs text-on-surface-variant">Lvl 1 Beginner</span>
            </div>
        </div>
    </div>
</aside>

<main class="ml-64 min-h-screen">
    <header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-20 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md flex items-center justify-between px-10 z-40 shadow-sm border-b border-surface-variant">
        <div class="flex items-center gap-8">
            <span class="text-lg font-bold text-slate-900 dark:text-slate-100">Session</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-on-surface-variant" data-icon="timer">timer</span>
                <span class="font-mono font-bold text-primary" id="timer-display">--:--</span>
            </div>
            <button id="finish-btn" onclick="finishTest()" class="hidden flex items-center gap-2 px-6 py-2 rounded-full bg-primary/10 text-primary font-bold hover:bg-primary/20 transition-all">
                Finish Test
            </button>
        </div>
    </header>

    <div class="pt-28 px-12 pb-12 max-w-4xl mx-auto" id="app-container">
        <section class="mb-12">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <span class="text-on-surface-variant font-medium tracking-widest uppercase text-xs">Current Module</span>
                    <h1 class="text-4xl font-extrabold tracking-tight mt-1" id="mode-title">Learning Mode</h1>
                </div>
                <div class="text-right">
                    <span class="text-primary font-bold text-2xl" id="progress-text">0%</span>
                    <span class="text-on-surface-variant block text-xs font-semibold uppercase tracking-widest">Progress</span>
                </div>
            </div>
            <div class="h-3 w-full bg-surface-container rounded-full overflow-hidden relative">
                <div id="progress-bar" class="absolute left-0 top-0 h-full w-[0%] bg-tertiary-fixed rounded-full shadow-[0_0_15px_rgba(107,255,193,0.5)] transition-all duration-500"></div>
            </div>
        </section>

        <!-- Dynamic Questions Area -->
        <div class="flex flex-col gap-8" id="questions-list">
            <!-- Rendered via JS -->
        </div>

        <div id="nav-buttons" class="mt-12 flex justify-between hidden">
            <button onclick="prevQuestion()" id="prev-btn" class="px-6 py-3 rounded-full bg-surface-container text-on-surface font-bold hover:bg-surface-variant transition-colors disabled:opacity-50" disabled>Previous</button>
            <button onclick="nextQuestion()" id="next-btn" class="px-6 py-3 rounded-full bg-primary text-white font-bold hover:bg-primary-dim transition-colors shadow-lg">Next Question</button>
        </div>
    </div>
</main>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
